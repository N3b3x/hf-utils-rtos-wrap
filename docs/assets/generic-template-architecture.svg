<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13">
  <title>Reader / Writer / Saver template architecture</title>
  <desc>Each generic template (FlagsSaver, SeqlockSnapshot, ErrorHistory) splits into a Reader ABC, a Writer ABC, and a concrete Saver class that derives from both. Consumers receive a Reader* or Writer* pointer to enforce layering.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 z" fill="#475569"/>
    </marker>
    <marker id="empty" markerWidth="14" markerHeight="14" refX="13" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L13,7 L0,14 z" fill="#ffffff" stroke="#475569" stroke-width="1.4"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="440" y="28" text-anchor="middle" font-size="17" font-weight="600" fill="#0f172a">Reader / Writer ABC + concrete Saver — one header per primitive</text>
  <text x="440" y="48" text-anchor="middle" fill="#64748b">Same shape for FlagsSaver&lt;FlagId,N&gt;, SeqlockSnapshot&lt;T&gt;, ErrorHistory&lt;Record,N&gt;</text>

  <!-- Apps tier (left consumer) -->
  <rect x="30" y="90" width="200" height="80" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="130" y="115" text-anchor="middle" font-weight="600" fill="#1e3a8a">apps/ consumer</text>
  <text x="130" y="135" text-anchor="middle" fill="#1e3a8a">e.g. mode thread</text>
  <text x="130" y="153" text-anchor="middle" fill="#475569" font-style="italic">holds Reader* OR Writer*</text>

  <!-- Middleware tier (right consumer) -->
  <rect x="650" y="90" width="200" height="80" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="750" y="115" text-anchor="middle" font-weight="600" fill="#14532d">middleware/ consumer</text>
  <text x="750" y="135" text-anchor="middle" fill="#14532d">e.g. SafetyMonitorThread</text>
  <text x="750" y="153" text-anchor="middle" fill="#475569" font-style="italic">holds Reader* OR Writer*</text>

  <!-- Reader ABC -->
  <rect x="120" y="220" width="220" height="100" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="230" y="245" text-anchor="middle" font-weight="600" fill="#92400e">Reader&lt;…&gt;  (pure-virtual)</text>
  <line x1="135" y1="255" x2="325" y2="255" stroke="#d97706" stroke-width="1"/>
  <text x="135" y="275" fill="#451a03">+ IsSet / Read / Snapshot</text>
  <text x="135" y="293" fill="#451a03">+ Seq / Size / OverwriteCount</text>
  <text x="135" y="311" fill="#451a03">+ WaitForChange (optional)</text>

  <!-- Writer ABC -->
  <rect x="540" y="220" width="220" height="100" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="650" y="245" text-anchor="middle" font-weight="600" fill="#92400e">Writer&lt;…&gt;  (pure-virtual)</text>
  <line x1="555" y1="255" x2="745" y2="255" stroke="#d97706" stroke-width="1"/>
  <text x="555" y="275" fill="#451a03">+ Set / Clear / Publish / Push</text>
  <text x="555" y="293" fill="#451a03">+ ClearAll / Pop / Clear</text>
  <text x="555" y="311" fill="#451a03">+ ClearWaitEvent</text>

  <!-- Concrete Saver -->
  <rect x="280" y="370" width="320" height="70" rx="8" fill="#e0e7ff" stroke="#4338ca" stroke-width="1.8"/>
  <text x="440" y="395" text-anchor="middle" font-weight="700" fill="#312e81">Saver&lt;…&gt;  final  (concrete)</text>
  <text x="440" y="415" text-anchor="middle" fill="#312e81" font-style="italic">FlagsSaver | SeqlockSnapshot | ErrorHistory</text>
  <text x="440" y="432" text-anchor="middle" fill="#475569">owns storage · seq counter · optional event group / mutex</text>

  <!-- Inheritance arrows (Saver → Reader / Saver → Writer, hollow triangle) -->
  <line x1="350" y1="370" x2="240" y2="320" stroke="#475569" stroke-width="1.5" marker-end="url(#empty)"/>
  <line x1="530" y1="370" x2="640" y2="320" stroke="#475569" stroke-width="1.5" marker-end="url(#empty)"/>

  <!-- Consumer → ABC (uses) -->
  <line x1="130" y1="170" x2="220" y2="220" stroke="#475569" stroke-width="1.4" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <line x1="750" y1="170" x2="660" y2="220" stroke="#475569" stroke-width="1.4" marker-end="url(#arrow)" stroke-dasharray="4,3"/>

  <!-- Legend -->
  <g font-size="11" fill="#475569">
    <line x1="40" y1="430" x2="80" y2="430" stroke="#475569" stroke-width="1.5" marker-end="url(#empty)"/>
    <text x="88" y="434">derives from</text>
    <line x1="180" y1="430" x2="220" y2="430" stroke="#475569" stroke-width="1.4" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
    <text x="228" y="434">depends on / uses</text>
  </g>
</svg>
